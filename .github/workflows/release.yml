name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build lib
        run: pnpm --filter @opencode-pr-agent/lib build

      - name: Build action
        run: pnpm --filter @opencode-pr-agent/action build

      - name: Verify dist
        run: |
          test -f action/lib/index.js || { echo "action/lib/index.js missing!"; exit 1; }
          echo "Build artifacts verified."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            action/lib/index.js
            action/action.yml
            action/package.json
            README.md
            LICENSE
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}
