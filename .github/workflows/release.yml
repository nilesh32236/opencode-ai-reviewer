name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build lib
        run: pnpm --filter @opencode-pr-agent/lib build

      - name: Build action
        run: pnpm --filter @opencode-pr-agent/action build

      - name: Verify dist
        run: |
          test -f action/lib/index.js || { echo "action/lib/index.js missing!"; exit 1; }
          echo "Build artifacts verified."

      - name: Generate changelog entry
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Skip if changelog already has this tag
          if grep -q "^## \[${TAG}\]" CHANGELOG.md; then
            echo "Changelog entry for ${TAG} already exists — skipping auto-generation."
            exit 0
          fi
          PREV_TAG=$(git tag --sort=-version:refname | head -1 || echo "")
          [ -z "$PREV_TAG" ] && PREV_TAG="v1.0.4"
          DATE=$(date -u +%Y-%m-%d)
          cat >> CHANGELOG.md <<-EOF

          ## [${TAG}] — ${DATE}

          ### Added
          - _(list new features)_

          ### Fixed
          - _(list bug fixes)_

          ### Changed
          - _(list refactors or dependency updates)_

          [${TAG}]: https://github.com/nilesh32236/opencode-ai-reviewer/compare/${PREV_TAG}...${TAG}
          EOF
          echo "Changelog placeholder generated for ${TAG}."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            action/lib/index.js
            action/action.yml
            action/package.json
            README.md
            LICENSE
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}

      - name: Tag as latest
        # Only update `latest` for stable releases — not rc/beta pre-releases.
        # Force-push so the `latest` tag always points to the newest stable commit.
        if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'beta') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag --force latest
          git push origin latest --force
          echo "✅ 'latest' tag updated → $(git rev-parse HEAD)"
