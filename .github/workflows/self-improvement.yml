name: Autonomous Self-Improvement

on:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

env:
  CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}

jobs:
  self-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor || 'opencode-ai-reviewer[bot]' }}"
          git config --global user.email "${{ github.actor || 'opencode-ai-reviewer[bot]' }}@users.noreply.github.com"
          git config --global url."https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm & Workspace Dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Setup OpenCode
        run: |
          chmod +x .github/scripts/setup-opencode.sh
          .github/scripts/setup-opencode.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Write Self-Improvement Prompt
        run: |
          cat << 'EOF' > /tmp/self-improve-prompt.txt
          You are a Self-Improving AI Agent for the **OpenCode AI Reviewer** codebase.
          Your goal is to autonomously improve this repository by refactoring code, adding new features, improving workflows, updating workspace skills, or fixing bugs.

          ## Research & Context Enrichment
          1. Use the **search_web** tool to search for new features, best practices, or Node/TypeScript patterns.
          2. Use **Context7 MCP** or CLI to check the latest APIs and documentation for libraries used in this project (e.g. Probot, SQLite, Vitest, @actions/core, @actions/exec).

          ## Tasks to Perform
          - **Refactoring:** Enhance error boundaries, API rate-limit retries, SQLite transaction safety, or PR pagination (as highlighted in codebase audits).
          - **New Features:** Add new functionalities to the core reviewer or Action wrappers (e.g. better diagnostic logging, new audit rules, new test utilities).
          - **customizations:** Create or enhance agent skills under `.agents/skills/` or general project rules.
          - **Prompt Engineering:** Improve prompts under `.audit-prompts/` to make AI audits more precise.

          ## Verification & Compilation Checklist
          1. All changes MUST be compiled and typechecked: `pnpm build && pnpm typecheck`.
          2. All unit tests MUST pass: `pnpm test`.
          3. Biome linting rules must be followed: `pnpm lint`.
          4. If compilation, linting, or tests fail, analyze the error output carefully and fix it. Do NOT commit broken code.
          5. Do NOT perform any git operations (git push, git commit) yourself. The workflow will handle them.

          When finished, write a detailed summary of your improvements to `.improvement-summary.md` in markdown format. Explain what you changed and why.
          EOF

      - name: Run OpenCode Self-Improvement
        run: |
          opencode run --auto --model opencode/deepseek-v4-flash-free "$(cat /tmp/self-improve-prompt.txt)" < /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Create Pull Request
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="improvement/run-${{ github.run_id }}"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "feat(improvement): autonomous codebase enhancement"
            git push origin "$BRANCH" --force

            # Build PR body
            PR_BODY="## Autonomous Codebase Improvement\n\n"
            if [ -f .improvement-summary.md ]; then
              PR_BODY="$PR_BODY$(cat .improvement-summary.md)"
              rm .improvement-summary.md
            else
              PR_BODY="$PR_BODY The self-improving agent has refactored the codebase and verified all checks successfully."
            fi

            # Ensure autofix label exists
            gh label create "autofix" --force --color "243cd4" 2>/dev/null || true

            gh pr create \
              --title "[Self-Improvement] Autonomous Codebase Enhancement" \
              --body "$PR_BODY" \
              --label "autofix" \
              --head "$BRANCH" \
              --base main
          else
            echo "No improvements or changes made."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
