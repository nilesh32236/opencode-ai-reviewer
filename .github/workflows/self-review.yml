name: AI Self Review & Audit

on:
  pull_request:
    types: [opened, synchronize, labeled, closed]
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 0 * * *'  # Daily audit at midnight UTC
  workflow_dispatch:
    inputs:
      audit_category:
        description: 'Specific audit category (omit for random)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

# ─── Concurrency strategy ──────────────────────────────────────────────────────
# We use different groups for review vs autofix to prevent them cancelling each
# other.  The autofix job has its OWN inner concurrency block (cancel-in-progress:
# false) so a new push from the bot never kills an in-flight fix iteration.
#
# The outer workflow-level group prevents two *review* runs from colliding on the
# same PR, but must NOT cancel when an autofix commit triggers a synchronize event.
# We detect that by including github.actor in the group so bot-push events land in
# a different (disposable) group that never starts the review job anyway.
concurrency:
  group: self-review-${{ github.event.pull_request.number || github.event.issue.number || github.sha }}-${{ github.actor }}
  cancel-in-progress: false

jobs:
  # ─── PR Review (human PRs + self-improvement PRs) ───────────────────────────
  review:
    # Skip if:
    #   - scheduled/dispatch (those go to audit)
    #   - PR is being closed
    #   - Pusher is a bot doing an autofix commit (not an authored improvement PR)
    #   - PR branch starts with autofix/ (bot fix loop — handled by autofix job)
    #   - PR already has an autofix-family label (under active fix loop)
    #
    # self-improvement PRs (branch improvement/, label self-improvement) ARE
    # reviewed here — they're bot-authored but need a code review before merge,
    # NOT an auto-fix loop.  We allow them through by only blocking the
    # autofix-family labels, not the improvement branch or label.
    if: |
      github.event_name != 'schedule' &&
      github.event_name != 'workflow_dispatch' &&
      github.event.action != 'closed' &&
      !startsWith(github.event.pull_request.head.ref, 'autofix/') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:merged') &&
      (
        (
          github.event_name == 'pull_request' &&
          (
            github.actor != 'github-actions[bot]' &&
            !endsWith(github.actor, '[bot]')
          ) ||
          contains(github.event.pull_request.labels.*.name, 'self-improvement')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          (contains(github.event.comment.body || '', '/review') || contains(github.event.comment.body || '', '/oc'))
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
    steps:
      - name: Resolve PR Ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "${{ github.event.issue.pull_request }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: ./action
        with:
          mode: review
          model: 'opencode/deepseek-v4-flash-free'
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

  # ─── Autofix Review Loop ──────────────────────────────────────────────────────
  # Runs the full review→fix→review loop inside a single workflow execution.
  # The inner concurrency group (per PR) prevents a second trigger from starting
  # a parallel run.  cancel-in-progress: false ensures a bot-push synchronize
  # event queues behind the running job rather than cancelling it.
  autofix:
    concurrency:
      group: autofix-loop-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    if: |
      github.event_name != 'schedule' &&
      github.event_name != 'workflow_dispatch' &&
      github.event.action != 'closed' &&
      (
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'autofix') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:merged') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:ready')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body || '', '/fix')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
    steps:
      - name: Resolve PR Ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "${{ github.event.issue.pull_request }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm & dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - uses: ./action
        with:
          mode: fix
          model: 'opencode/deepseek-v4-flash-free'
          max_fix_iterations: 3
          run_checks_after_fix: 'pnpm lint'
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

  # ─── Daily Codebase Audit ─────────────────────────────────────────────────────
  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Ensure autofix label exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autofix" --force --color "243cd4" 2>/dev/null || true
          gh label create "autofix-trigger" --force --color "c2e0c6" --description "Triggers autofix workflow on issues" 2>/dev/null || true

      - uses: ./action
        with:
          mode: audit
          model: 'opencode/deepseek-v4-flash-free'
          audit_prompt_file: ${{ inputs.audit_category }}
          audit_create_issues: true
          audit_auto_fix: true
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

  # ─── Fix Audit Issue ──────────────────────────────────────────────────────────
  # Triggered by /fix on a plain issue or when audit adds autofix-trigger label.
  # Creates an autofix/ branch and opens a PR with label "autofix".
  # The PR will then be handled by the autofix job on the next run.
  fix-issue:
    if: |
      github.event.issue.pull_request == null && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '/fix'))
        ||
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'autofix-trigger'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autofix" --force --color "243cd4" 2>/dev/null || true
          gh label create "autofix:ready" --force --color "0e8a16" --description "Approved — ready to merge" 2>/dev/null || true
          gh label create "autofix:needs-manual-review" --force --color "d93f0b" --description "Max iterations reached" 2>/dev/null || true

      - uses: ./action
        with:
          mode: fix
          model: 'opencode/deepseek-v4-flash-free'
          max_fix_iterations: 1
          run_checks_after_fix: 'pnpm lint'
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

  # ─── Auto-Merge Approved PR ───────────────────────────────────────────────────
  auto-merge:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'autofix:ready'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Squash-merge approved PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Merging PR #${PR_NUMBER} (autofix:ready)..."
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --auto || {
            echo "::warning::Auto-merge failed — PR #${PR_NUMBER} may need manual merge"
          }

  # ─── Merge Notification ───────────────────────────────────────────────────────
  notify-merged:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autofix:ready')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post merge notification
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          BODY="## ✅ Merged to Main

          PR #${PR_NUMBER} has been merged.

          All autofix issues were resolved and the review agent approved this PR.

          ---
          *🤖 Posted automatically by opencode-ai-reviewer*"
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$BODY"

      - name: Update labels
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --remove-label "autofix:ready" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --add-label "autofix:merged" 2>/dev/null || true
